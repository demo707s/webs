<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kemp">
<meta name="theme-color" content="#2d5a27">
<title>Kempovací checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  header {
    background: #2d5a27;
    color: white;
    padding: 20px 16px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 8px;
  }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.25);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar {
    background: #7ed957;
    height: 100%;
    border-radius: 99px;
    transition: width 0.3s ease;
  }

  .progress-text {
    font-size: 13px;
    margin-top: 6px;
    opacity: 0.85;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: #f5f5f0;
    border-bottom: 1px solid #ddd;
    position: sticky;
    top: 88px;
    z-index: 9;
  }

  .toolbar button {
    flex: 1;
    padding: 8px 4px;
    border: 1.5px solid #ccc;
    border-radius: 8px;
    background: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: #333;
    transition: all 0.15s;
  }

  .toolbar button:active { transform: scale(0.97); }
  .toolbar button.active { background: #2d5a27; color: white; border-color: #2d5a27; }

  .category {
    margin: 16px 12px 0;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: white;
    border-radius: 12px 12px 0 0;
    border: 1px solid #e0e0e0;
    border-bottom: none;
    cursor: pointer;
    user-select: none;
  }

  .category-header:active { background: #f0f0f0; }

  .category-icon {
    font-size: 20px;
    width: 28px;
    text-align: center;
  }

  .category-title {
    font-size: 15px;
    font-weight: 700;
    flex: 1;
    color: #2d5a27;
  }

  .category-count {
    font-size: 12px;
    color: #888;
    font-weight: 500;
  }

  .category-chevron {
    font-size: 12px;
    color: #aaa;
    transition: transform 0.2s;
  }

  .category.collapsed .category-chevron { transform: rotate(-90deg); }

  .items-list {
    background: white;
    border: 1px solid #e0e0e0;
    border-top: none;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
  }

  .category.collapsed .items-list { display: none; }

  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.1s;
    -webkit-user-select: none;
    user-select: none;
  }

  .item:last-child { border-bottom: none; }
  .item:active { background: #f8f8f8; }

  .item.missing {
    background: #fff5f5;
  }

  .item.missing .item-label {
    color: #c0392b;
    font-weight: 600;
  }

  .checkbox {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 2px solid #ccc;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: white;
  }

  .item.checked .checkbox {
    background: #2d5a27;
    border-color: #2d5a27;
  }

  .item.missing .checkbox {
    border-color: #e74c3c;
  }

  .checkmark {
    display: none;
    width: 13px;
    height: 13px;
    stroke: white;
    stroke-width: 2.5;
    fill: none;
  }

  .item.checked .checkmark { display: block; }

  .missing-dot {
    display: block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #e74c3c;
    transition: all 0.15s;
  }

  .item.checked .missing-dot,
  .item:not(.missing) .missing-dot { display: none; }

  .item-label {
    font-size: 15px;
    color: #222;
    flex: 1;
    line-height: 1.3;
    transition: color 0.15s;
  }

  .item.checked .item-label {
    color: #aaa;
    text-decoration: line-through;
  }

  .item-note {
    font-size: 12px;
    color: #999;
    margin-top: 2px;
  }

  .item.missing .item-note { color: #e07070; }

  .reset-btn {
    display: block;
    margin: 24px auto 8px;
    padding: 14px 32px;
    background: #2d5a27;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    width: calc(100% - 24px);
    max-width: 400px;
    letter-spacing: 0.2px;
  }

  .reset-btn:active { background: #1e3d1b; transform: scale(0.99); }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    padding: 8px 16px 0;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #f0f0f0; }
    header { background: #1e3d1b; }
    .toolbar { background: #1a1a1a; border-color: #333; }
    .toolbar button { background: #2a2a2a; border-color: #444; color: #ccc; }
    .toolbar button.active { background: #2d5a27; color: white; border-color: #2d5a27; }
    .category-header { background: #252525; border-color: #333; }
    .category-header:active { background: #2f2f2f; }
    .items-list { background: #222; border-color: #333; }
    .item { border-color: #2e2e2e; }
    .item:active { background: #2a2a2a; }
    .item.missing { background: #2a1a1a; }
    .item.missing .item-label { color: #ff7070; }
    .item.missing .item-note { color: #cc6060; }
    .item-label { color: #e0e0e0; }
    .item.checked .item-label { color: #555; }
    .checkbox { background: #333; border-color: #555; }
    .item.missing .checkbox { border-color: #cc3333; }
  }
</style>
</head>
<body>

<header>
  <h1>🏕️ Kempovací checklist</h1>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
  </div>
  <div class="progress-text" id="progressText">0 / 0 zaškrtnuto</div>
</header>

<div class="toolbar">
  <button id="btnAll" class="active" onclick="setFilter('all')">Vše</button>
  <button id="btnMissing" onclick="setFilter('missing')">Chybí</button>
  <button id="btnDone" onclick="setFilter('done')">Mám</button>
</div>

<div id="categoriesContainer"></div>

<button class="reset-btn" onclick="confirmReset()">Začít znovu (vše odškrtnout)</button>
<p class="footer-note">Stav se ukládá automaticky v prohlížeči</p>

<script>
const DATA = [
  {
    icon: "🛏️",
    title: "Spánek & přístřeší",
    items: [
      { id: "stan", label: "Stan / hamaka" },
      { id: "karimatka", label: "Karimatka" },
      { id: "spacak", label: "Spací pytel" },
      { id: "polstar", label: "Polštář" },
      { id: "lehatko", label: "Nafukovací lehátko" },
    ]
  },
  {
    icon: "👕",
    title: "Oblečení",
    items: [
      { id: "trika", label: "Trička" },
      { id: "trenky", label: "Trenky" },
      { id: "ponozky", label: "Ponožky" },
      { id: "kratasy", label: "Kraťasy" },
      { id: "tepláky", label: "Tepláky" },
      { id: "mikina", label: "Mikina" },
    ]
  },
  {
    icon: "⚡",
    title: "Energie",
    items: [
      { id: "powerbanka", label: "Powerbanka" },
      { id: "nabijjecky", label: "Nabíječky" },
    ]
  },
  {
    icon: "🧴",
    title: "Hygiena & zdraví",
    items: [
      { id: "leky", label: "Léky" },
      { id: "opalovak", label: "Opalovák" },
      { id: "repelent", label: "Repelent" },
      { id: "hygiena", label: "Hygiena" },
    ]
  },
  {
    icon: "🎒",
    title: "Vybavení & zábava",
    items: [
      { id: "nuz", label: "Nůž" },
      { id: "provaz", label: "Provaz" },
      { id: "karty", label: "Karty" },
    ]
  },
];

const STORAGE_KEY = 'kemping_checklist_v1';

let checked = {};
let currentFilter = 'all';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) checked = JSON.parse(saved);
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
  } catch(e) {}
}

function toggleItem(id) {
  checked[id] = !checked[id];
  saveState();
  render();
}

function toggleCategory(catIndex) {
  const el = document.getElementById('cat_' + catIndex);
  el.classList.toggle('collapsed');
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
  render();
}

function confirmReset() {
  if (confirm('Opravdu chceš vše odškrtnout?')) {
    checked = {};
    saveState();
    render();
  }
}

function getAllItems() {
  return DATA.flatMap(cat => cat.items);
}

function updateProgress() {
  const all = getAllItems();
  const total = all.length;
  const done = all.filter(i => checked[i.id]).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total + ' zaškrtnuto (' + pct + '%)';
}

function render() {
  updateProgress();
  const container = document.getElementById('categoriesContainer');

  DATA.forEach((cat, ci) => {
    const catEl = document.getElementById('cat_' + ci);
    const listEl = document.getElementById('list_' + ci);

    let visibleItems = cat.items;
    if (currentFilter === 'missing') visibleItems = cat.items.filter(i => !checked[i.id]);
    if (currentFilter === 'done') visibleItems = cat.items.filter(i => checked[i.id]);

    const total = cat.items.length;
    const done = cat.items.filter(i => checked[i.id]).length;

    document.getElementById('count_' + ci).textContent = done + '/' + total;

    if (visibleItems.length === 0) {
      catEl.style.display = 'none';
    } else {
      catEl.style.display = 'block';
      listEl.innerHTML = visibleItems.map(item => {
        const isMissing = !checked[item.id];
        const isChecked = !!checked[item.id];
        return `<div class="item ${isChecked ? 'checked' : ''} ${isMissing && currentFilter !== 'done' ? 'missing' : ''}" onclick="toggleItem('${item.id}')">
          <div class="checkbox">
            <svg class="checkmark" viewBox="0 0 13 10"><polyline points="1,5 5,9 12,1"/></svg>
            <span class="missing-dot"></span>
          </div>
          <div style="flex:1">
            <div class="item-label">${item.label}</div>
            ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
          </div>
        </div>`;
      }).join('');
    }
  });
}

function buildDOM() {
  const container = document.getElementById('categoriesContainer');
  container.innerHTML = '';

  DATA.forEach((cat, ci) => {
    const div = document.createElement('div');
    div.className = 'category';
    div.id = 'cat_' + ci;
    div.innerHTML = `
      <div class="category-header" onclick="toggleCategory(${ci})">
        <span class="category-icon">${cat.icon}</span>
        <span class="category-title">${cat.title}</span>
        <span class="category-count" id="count_${ci}"></span>
        <span class="category-chevron">▼</span>
      </div>
      <div class="items-list" id="list_${ci}"></div>
    `;
    container.appendChild(div);
  });
}

loadState();
buildDOM();
render();
</script>

</body>
</html>
