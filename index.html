<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kemp">
<meta name="theme-color" content="#2d5a27">
<title>Kempovací checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* ── USER PICKER OVERLAY ── */
  #picker {
    position: fixed; inset: 0; z-index: 100;
    background: #1e3d1b;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 20px;
  }

  #picker h2 {
    color: #fff;
    font-size: 26px; font-weight: 800;
    margin-bottom: 6px; text-align: center;
  }

  #picker p {
    color: rgba(255,255,255,0.6);
    font-size: 15px; margin-bottom: 28px; text-align: center;
  }

  .user-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%; max-width: 360px;
  }

  .user-btn {
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    padding: 16px 12px;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    transition: all 0.15s;
    color: white;
  }

  .user-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.2); }

  .user-avatar {
    font-size: 32px;
    line-height: 1;
  }

  .user-name {
    font-size: 14px; font-weight: 700;
    text-align: center; line-height: 1.2;
  }

  /* ── HEADER ── */
  header {
    background: #2d5a27;
    color: white;
    padding: 16px 16px 14px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }

  .header-top h1 { font-size: 20px; font-weight: 800; }

  .user-chip {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 99px;
    padding: 5px 12px 5px 8px;
    cursor: pointer;
    font-size: 13px; font-weight: 600; color: white;
    transition: background 0.15s;
  }
  .user-chip:active { background: rgba(255,255,255,0.25); }
  .user-chip-avatar { font-size: 16px; }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.25);
    border-radius: 99px; height: 6px; overflow: hidden;
  }

  .progress-bar {
    background: #7ed957;
    height: 100%; border-radius: 99px;
    transition: width 0.3s ease;
  }

  .progress-text { font-size: 13px; margin-top: 6px; opacity: 0.85; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex; gap: 8px;
    padding: 12px 16px;
    background: #f5f5f0;
    border-bottom: 1px solid #ddd;
    position: sticky; top: 86px; z-index: 9;
  }

  .toolbar button {
    flex: 1; padding: 8px 4px;
    border: 1.5px solid #ccc; border-radius: 8px;
    background: white; font-size: 13px; font-weight: 600;
    cursor: pointer; color: #333; transition: all 0.15s;
  }

  .toolbar button:active { transform: scale(0.97); }
  .toolbar button.active { background: #2d5a27; color: white; border-color: #2d5a27; }

  /* ── CATEGORIES ── */
  .category { margin: 16px 12px 0; }

  .category-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    background: white;
    border-radius: 12px 12px 0 0;
    border: 1px solid #e0e0e0; border-bottom: none;
    cursor: pointer; user-select: none;
  }

  .category-header:active { background: #f0f0f0; }
  .category-icon { font-size: 20px; width: 28px; text-align: center; }
  .category-title { font-size: 15px; font-weight: 700; flex: 1; color: #2d5a27; }
  .category-count { font-size: 12px; color: #888; font-weight: 500; }
  .category-chevron { font-size: 12px; color: #aaa; transition: transform 0.2s; }
  .category.collapsed .category-chevron { transform: rotate(-90deg); }

  .items-list {
    background: white;
    border: 1px solid #e0e0e0; border-top: none;
    border-radius: 0 0 12px 12px; overflow: hidden;
  }

  .category.collapsed .items-list { display: none; }

  /* ── ITEMS ── */
  .item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer; transition: background 0.1s;
    -webkit-user-select: none; user-select: none;
  }

  .item:last-child { border-bottom: none; }
  .item:active { background: #f8f8f8; }
  .item.missing { background: #fff5f5; }
  .item.missing .item-label { color: #c0392b; font-weight: 600; }

  .checkbox {
    width: 24px; height: 24px; border-radius: 6px;
    border: 2px solid #ccc; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; background: white;
  }

  .item.checked .checkbox { background: #2d5a27; border-color: #2d5a27; }
  .item.missing .checkbox { border-color: #e74c3c; }

  .checkmark {
    display: none; width: 13px; height: 13px;
    stroke: white; stroke-width: 2.5; fill: none;
  }

  .item.checked .checkmark { display: block; }

  .missing-dot {
    display: block; width: 8px; height: 8px;
    border-radius: 50%; background: #e74c3c; transition: all 0.15s;
  }

  .item.checked .missing-dot,
  .item:not(.missing) .missing-dot { display: none; }

  .item-label {
    font-size: 15px; color: #222; flex: 1;
    line-height: 1.3; transition: color 0.15s;
  }

  .item.checked .item-label { color: #aaa; text-decoration: line-through; }
  .item-note { font-size: 12px; color: #999; margin-top: 2px; }
  .item.missing .item-note { color: #e07070; }

  /* ── BOTTOM BUTTONS ── */
  .reset-btn {
    display: block; margin: 24px auto 8px;
    padding: 14px 32px; background: #2d5a27;
    color: white; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    width: calc(100% - 24px); max-width: 400px;
  }

  .reset-btn:active { background: #1e3d1b; transform: scale(0.99); }

  .switch-btn {
    display: block; margin: 0 auto 4px;
    padding: 12px 32px; background: transparent;
    color: #888; border: 1.5px solid #ccc; border-radius: 12px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    width: calc(100% - 24px); max-width: 400px;
  }

  .switch-btn:active { background: #eee; }

  .footer-note {
    text-align: center; font-size: 12px;
    color: #aaa; padding: 8px 16px 0;
  }

  /* ── DARK MODE ── */
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #f0f0f0; }
    header { background: #1e3d1b; }
    .toolbar { background: #1a1a1a; border-color: #333; }
    .toolbar button { background: #2a2a2a; border-color: #444; color: #ccc; }
    .toolbar button.active { background: #2d5a27; color: white; border-color: #2d5a27; }
    .category-header { background: #252525; border-color: #333; }
    .category-header:active { background: #2f2f2f; }
    .items-list { background: #222; border-color: #333; }
    .item { border-color: #2e2e2e; }
    .item:active { background: #2a2a2a; }
    .item.missing { background: #2a1a1a; }
    .item.missing .item-label { color: #ff7070; }
    .item.missing .item-note { color: #cc6060; }
    .item-label { color: #e0e0e0; }
    .item.checked .item-label { color: #555; }
    .checkbox { background: #333; border-color: #555; }
    .item.missing .checkbox { border-color: #cc3333; }
    .switch-btn { color: #666; border-color: #444; }
    .switch-btn:active { background: #2a2a2a; }
    .footer-note { color: #555; }
  }
</style>
</head>
<body>

<!-- USER PICKER -->
<div id="picker">
  <h2>🏕️ Kempovací checklist</h2>
  <p>Kdo jsi?</p>
  <div class="user-grid" id="userGrid"></div>
</div>

<!-- MAIN APP (hidden until user selected) -->
<div id="app" style="display:none">
  <header>
    <div class="header-top">
      <h1 id="headerTitle">🏕️ Checklist</h1>
      <div class="user-chip" onclick="switchUser()" id="userChip">
        <span class="user-chip-avatar" id="chipAvatar"></span>
        <span id="chipName"></span>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width: 0%"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 0 zaškrtnuto</div>
  </header>

  <div class="toolbar">
    <button id="btnAll" class="active" onclick="setFilter('all')">Vše</button>
    <button id="btnMissing" onclick="setFilter('missing')">Chybí</button>
    <button id="btnDone" onclick="setFilter('done')">Mám</button>
  </div>

  <div id="categoriesContainer"></div>

  <button class="reset-btn" onclick="confirmReset()">Začít znovu (vše odškrtnout)</button>
  <button class="switch-btn" onclick="switchUser()">Změnit uživatele</button>
  <p class="footer-note">Každý má svůj vlastní seznam</p>
</div>

<script>
const USERS = [
  { id: 'branas',       name: 'Braňas',        avatar: '🍺' },
  { id: 'celis',        name: 'Čelis',          avatar: '🍺' },
  { id: 'jagr',         name: 'Kapitán Jägger', avatar: '🍺' },
  { id: 'mocal',        name: 'Močál',          avatar: '🍺' },
  { id: 'zeblitek',     name: 'Pan zeblitek',   avatar: '🍺' },
  { id: 'stepik',       name: 'Stepik',         avatar: '🍺' },
  { id: 'vodka',        name: 'VODKA master',   avatar: '🍺' },
  { id: 'berta',        name: 'Berta',          avatar: '🍺' },
  { id: 'kotlas',       name: 'Kotlas',         avatar: '🍺' },
];

const DATA = [
  {
    icon: "🤝",
    title: "Společné věci",
    shared: true,
    items: [
      { id: "sh_grill",   label: "Grill" },
      { id: "sh_nuz",     label: "Nůž" },
      { id: "sh_alkohol", label: "Alkohol" },
      { id: "sh_karty",   label: "Karty" },
      { id: "sh_provaz",  label: "Provaz" },
    ]
  },
  {
    icon: "🛏️",
    title: "Spánek & přístřeší",
    items: [
      { id: "stan",      label: "Stan / hamaka" },
      { id: "karimatka", label: "Karimatka" },
      { id: "spacak",    label: "Spací pytel" },
      { id: "polstar",   label: "Polštář" },
      { id: "lehatko",   label: "Nafukovací lehátko" },
    ]
  },
  {
    icon: "👕",
    title: "Oblečení",
    items: [
      { id: "trika",   label: "Trička" },
      { id: "trenky",  label: "Trenky" },
      { id: "ponozky", label: "Ponožky" },
      { id: "kratasy", label: "Kraťasy" },
      { id: "teplaky", label: "Tepláky" },
      { id: "mikina",  label: "Mikina" },
    ]
  },
  {
    icon: "⚡",
    title: "Energie",
    items: [
      { id: "powerbanka", label: "Powerbanka" },
      { id: "nabijjecky", label: "Nabíječky" },
    ]
  },
  {
    icon: "🧴",
    title: "Hygiena & zdraví",
    items: [
      { id: "leky",     label: "Léky" },
      { id: "opalovak", label: "Opalovák" },
      { id: "repelent", label: "Repelent" },
      { id: "hygiena",  label: "Hygiena" },
    ]
  },
  {
    icon: "🎒",
    title: "Vybavení & zábava",
    items: [
    ]
  },
];

const USER_KEY    = 'kemping_current_user';
const SHARED_KEY  = 'kemping_shared';

let currentUser   = null;
let checked       = {};
let sharedChecked = {};
let currentFilter = 'all';

function getChecked(isShared) { return isShared ? sharedChecked : checked; }

function loadState() {
  try { const s = localStorage.getItem('kemping_' + currentUser.id); checked = s ? JSON.parse(s) : {}; } catch(e) { checked = {}; }
  try { const s = localStorage.getItem(SHARED_KEY); sharedChecked = s ? JSON.parse(s) : {}; } catch(e) { sharedChecked = {}; }
}

function saveState(isShared) {
  try {
    if (isShared) localStorage.setItem(SHARED_KEY, JSON.stringify(sharedChecked));
    else          localStorage.setItem('kemping_' + currentUser.id, JSON.stringify(checked));
  } catch(e) {}
}

function selectUser(user) {
  currentUser = user;
  try { localStorage.setItem(USER_KEY, user.id); } catch(e) {}
  loadState();
  document.getElementById('picker').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('chipAvatar').textContent = user.avatar;
  document.getElementById('chipName').textContent = user.name;
  document.getElementById('headerTitle').textContent = '🏕️ ' + user.name;
  buildDOM();
  render();
}

function switchUser() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('picker').style.display = 'flex';
  currentUser = null;
}

function toggleItem(id, isShared) {
  if (isShared) { sharedChecked[id] = !sharedChecked[id]; saveState(true); }
  else          { checked[id]       = !checked[id];        saveState(false); }
  render();
}

function toggleCategory(ci) {
  document.getElementById('cat_' + ci).classList.toggle('collapsed');
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
  render();
}

function confirmReset() {
  if (confirm('Opravdu chceš vše odškrtnout? (Společné věci se nesmažou)')) {
    checked = {};
    saveState(false);
    render();
  }
}

function isItemChecked(item, cat) {
  return cat.shared ? !!sharedChecked[item.id] : !!checked[item.id];
}

function updateProgress() {
  const personal = DATA.filter(c => !c.shared).flatMap(c => c.items);
  const total = personal.length;
  const done  = personal.filter(i => !!checked[i.id]).length;
  const pct   = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total + ' zaškrtnuto (' + pct + '%)';
}

function render() {
  updateProgress();
  DATA.forEach((cat, ci) => {
    const catEl  = document.getElementById('cat_' + ci);
    const listEl = document.getElementById('list_' + ci);
    const isShared = !!cat.shared;

    let visibleItems = cat.items.filter(i => {
      const chk = isItemChecked(i, cat);
      if (currentFilter === 'missing') return !chk;
      if (currentFilter === 'done')    return  chk;
      return true;
    });

    const done = cat.items.filter(i => isItemChecked(i, cat)).length;
    document.getElementById('count_' + ci).textContent = done + '/' + cat.items.length;

    if (visibleItems.length === 0) {
      catEl.style.display = 'none';
    } else {
      catEl.style.display = 'block';
      listEl.innerHTML = visibleItems.map(item => {
        const isChecked = isItemChecked(item, cat);
        const isMissing = !isChecked && currentFilter !== 'done';
        return `<div class="item ${isChecked ? 'checked' : ''} ${isMissing ? 'missing' : ''}" onclick="toggleItem('${item.id}', ${isShared})">
          <div class="checkbox">
            <svg class="checkmark" viewBox="0 0 13 10"><polyline points="1,5 5,9 12,1"/></svg>
            <span class="missing-dot"></span>
          </div>
          <div style="flex:1">
            <div class="item-label">${item.label}</div>
            ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
          </div>
        </div>`;
      }).join('');
    }
  });
}

function buildDOM() {
  const container = document.getElementById('categoriesContainer');
  container.innerHTML = '';
  DATA.forEach((cat, ci) => {
    const div = document.createElement('div');
    div.className = 'category';
    div.id = 'cat_' + ci;
    const sharedBadge = cat.shared
      ? `<span style="font-size:11px;background:rgba(45,90,39,0.12);color:#2d5a27;border-radius:99px;padding:2px 8px;font-weight:700;margin-right:4px">VŠICHNI</span>`
      : '';
    div.innerHTML = `
      <div class="category-header" onclick="toggleCategory(${ci})">
        <span class="category-icon">${cat.icon}</span>
        <span class="category-title">${cat.title}</span>
        ${sharedBadge}
        <span class="category-count" id="count_${ci}"></span>
        <span class="category-chevron">▼</span>
      </div>
      <div class="items-list" id="list_${ci}"></div>
    `;
    container.appendChild(div);
  });
}

function buildPicker() {
  const grid = document.getElementById('userGrid');
  grid.innerHTML = USERS.map(u => `
    <button class="user-btn" onclick="selectUser(USERS.find(x=>x.id==='${u.id}'))">
      <span class="user-avatar">${u.avatar}</span>
      <span class="user-name">${u.name}</span>
    </button>
  `).join('');
}

buildPicker();
try {
  const savedId = localStorage.getItem(USER_KEY);
  if (savedId) { const u = USERS.find(x => x.id === savedId); if (u) selectUser(u); }
} catch(e) {}
</script>

</body>
</html>
